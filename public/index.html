<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyGame — интерфейс выбора блоков</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #1a1e2c;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            padding: 5px;
        }
        .game-container {
            background: #0b0d17;
            border-radius: 25px;
            padding: 15px;
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        /* Холст */
        .canvas-wrapper {
            width: 100%;
            aspect-ratio: 1/1;
            background: #141824;
            border-radius: 20px;
            overflow: hidden;
            touch-action: none;
            box-shadow: inset 0 0 20px #00000066;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
            background: #141824;
        }
        
        /* Панель управления */
        .control-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        /* Режимы игры */
        .mode-row {
            display: flex;
            gap: 8px;
        }
        .mode-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            font-size: 16px;
            background: #2f354a;
            color: white;
            border: 2px solid #4a516b;
            transition: all 0.1s;
        }
        .mode-btn.active {
            background: #5b9e7a;
            border-color: #8bc34a;
        }
        
        /* Строка с блоками */
        .blocks-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            background: #1f2332;
            padding: 12px;
            border-radius: 40px;
        }
        .block-btn {
            width: 60px;
            height: 60px;
            border: 3px solid #3d445e;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 2px black;
            box-shadow: 0 4px 0 #0b0d17;
            transition: all 0.05s;
            touch-action: manipulation;
        }
        .block-btn.selected {
            border-color: white;
            transform: scale(1.05);
            box-shadow: 0 0 15px currentColor;
        }
        .block-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }
        
        /* Кнопки движения */
        .move-row {
            display: flex;
            gap: 8px;
        }
        .move-btn {
            flex: 1;
            background: #2f354a;
            border: none;
            color: white;
            font-size: 28px;
            padding: 15px 0;
            border-radius: 50px;
            box-shadow: 0 5px 0 #0b0d17;
            border: 2px solid #4a516b;
            touch-action: manipulation;
        }
        .move-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }
        
        /* Чат */
        .chat-container {
            background: #1f2332;
            border-radius: 25px;
            padding: 12px;
        }
        #chatMessages {
            height: 80px;
            overflow-y: auto;
            color: #b7c0e0;
            font-size: 14px;
            padding: 5px;
            background: #141824;
            border-radius: 15px;
            margin-bottom: 8px;
        }
        .chat-input-area {
            display: flex;
            gap: 8px;
        }
        #chatInput {
            flex: 1;
            background: #0f121c;
            border: 2px solid #3d445e;
            color: white;
            padding: 12px 18px;
            border-radius: 40px;
            font-size: 16px;
        }
        #sendBtn {
            background: #4a6fa5;
            border: none;
            color: white;
            padding: 12px 25px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 18px;
        }
        
        /* Сервер и статус */
        .server-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        #serverUrl {
            flex: 1;
            background: #0f121c;
            border: 2px solid #3d445e;
            color: white;
            padding: 12px 18px;
            border-radius: 40px;
            font-size: 14px;
        }
        #connectBtn {
            background: #4a6fa5;
            border: none;
            color: white;
            padding: 12px 20px;
            border-radius: 40px;
            font-weight: bold;
        }
        #status {
            color: #7e89b3;
            text-align: center;
            font-size: 14px;
            padding: 5px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- Холст -->
        <div class="canvas-wrapper" id="wrapper">
            <canvas id="gameCanvas"></canvas>
        </div>
        
        <!-- Панель управления -->
        <div class="control-panel">
            <!-- Режимы -->
            <div class="mode-row">
                <button class="mode-btn active" id="modeSingle">👤 Одиночный</button>
                <button class="mode-btn" id="modeMulti">👥 Мультиплеер</button>
            </div>
            
            <!-- Блоки (8 штук) -->
            <div class="blocks-row" id="blocksContainer">
                <!-- будут добавлены скриптом -->
            </div>
            
            <!-- Движение -->
            <div class="move-row">
                <button class="move-btn" id="moveUp">⬆️</button>
                <button class="move-btn" id="moveDown">⬇️</button>
                <button class="move-btn" id="moveLeft">⬅️</button>
                <button class="move-btn" id="moveRight">➡️</button>
            </div>
            
            <!-- Чат -->
            <div class="chat-container">
                <div id="chatMessages"></div>
                <div class="chat-input-area">
                    <input type="text" id="chatInput" placeholder="Сообщение...">
                    <button id="sendBtn">➤</button>
                </div>
            </div>
            
            <!-- Сервер (для мультиплеера) -->
            <div class="server-row" id="serverRow" style="display: none;">
                <input type="text" id="serverUrl" placeholder="URL сервера (например: https://mygame.onrender.com)">
                <button id="connectBtn">🔌</button>
            </div>
            
            <!-- Статус -->
            <div id="status">🟢 Одиночный режим</div>
        </div>
    </div>

    <script>
        // ==================== НАСТРОЙКИ ====================
        const canvas = document.getElementById('gameCanvas');
        const wrapper = document.getElementById('wrapper');
        const ctx = canvas.getContext('2d');
        
        // Режим игры
        let gameMode = 'single'; // 'single' или 'multi'
        let socket = null;
        
        // Игрок
        let player = {
            x: 0,
            y: 0,
            name: 'Игрок' + Math.floor(Math.random() * 1000)
        };
        
        let players = {};
        let world = [];
        const WORLD_SIZE = 256;
        
        // Выбранный блок для установки
        let selectedBlock = 1; // по умолчанию земля
        
        // Список блоков (ID, название, цвет)
        const BLOCKS = [
            { id: 1, name: 'Земля', color: '#8B5A2B' },
            { id: 2, name: 'Камень', color: '#808080' },
            { id: 3, name: 'Трава', color: '#2E8B57' },
            { id: 4, name: 'Дерево', color: '#A0522D' },
            { id: 5, name: 'Песок', color: '#F4A460' },
            { id: 6, name: 'Вода', color: '#1E90FF' },
            { id: 7, name: 'Кирпич', color: '#B22222' },
            { id: 8, name: 'Золото', color: '#FFD700' }
        ];
        
        // Инициализация мира
        for (let i = 0; i < WORLD_SIZE; i++) {
            world[i] = [];
            for (let j = 0; j < WORLD_SIZE; j++) {
                world[i][j] = 0;
            }
        }
        
        // Добавим немного земли для красоты
        for (let i = 100; i < 120; i++) {
            for (let j = 100; j < 120; j++) {
                world[i][j] = 1;
            }
        }
        
        // ==================== СОЗДАНИЕ КНОПОК БЛОКОВ ====================
        const blocksContainer = document.getElementById('blocksContainer');
        BLOCKS.forEach(block => {
            const btn = document.createElement('button');
            btn.className = 'block-btn' + (block.id === selectedBlock ? ' selected' : '');
            btn.style.background = block.color;
            btn.setAttribute('data-block-id', block.id);
            btn.innerHTML = `<span>${block.name}</span>`;
            
            btn.addEventListener('click', () => {
                // Убираем выделение со всех кнопок
                document.querySelectorAll('.block-btn').forEach(b => b.classList.remove('selected'));
                // Выделяем текущую
                btn.classList.add('selected');
                selectedBlock = block.id;
            });
            
            blocksContainer.appendChild(btn);
        });
        
        // ==================== РАЗМЕР ХОЛСТА ====================
        function resizeCanvas() {
            const rect = wrapper.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            draw();
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        
        // ==================== ОТРИСОВКА ====================
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            let camX = player.x - canvas.width / 2;
            let camY = player.y - canvas.height / 2;
            
            // Пупырышки
            ctx.fillStyle = '#3a4055';
            for (let i = Math.floor(camX / 40) * 40; i < camX + canvas.width; i += 40) {
                for (let j = Math.floor(camY / 40) * 40; j < camY + canvas.height; j += 40) {
                    ctx.beginPath();
                    ctx.arc(i - camX, j - camY, 2, 0, 2 * Math.PI);
                    ctx.fill();
                }
            }
            
            // Блоки
            for (let x = Math.max(0, Math.floor(camX / 40)); x < Math.min(WORLD_SIZE, Math.ceil((camX + canvas.width) / 40)); x++) {
                for (let y = Math.max(0, Math.floor(camY / 40)); y < Math.min(WORLD_SIZE, Math.ceil((camY + canvas.height) / 40)); y++) {
                    const blockType = world[x]?.[y];
                    if (blockType && blockType !== 0) {
                        const block = BLOCKS.find(b => b.id === blockType) || BLOCKS[0];
                        ctx.fillStyle = block.color;
                        ctx.fillRect(x * 40 - camX, y * 40 - camY, 38, 38);
                    }
                }
            }
            
            // Другие игроки (только в мультиплеере)
            if (gameMode === 'multi' && socket) {
                for (let id in players) {
                    if (id !== socket.id) {
                        let p = players[id];
                        ctx.fillStyle = '#FF5555';
                        ctx.beginPath();
                        ctx.arc(p.x - camX, p.y - camY, 15, 0, 2 * Math.PI);
                        ctx.fill();
                        ctx.fillStyle = 'white';
                        ctx.font = '14px Arial';
                        ctx.fillText(p.name || '?', p.x - camX - 20, p.y - camY - 20);
                    }
                }
            }
            
            // Текущий игрок
            ctx.fillStyle = '#55FF55';
            ctx.beginPath();
            ctx.arc(canvas.width / 2, canvas.height / 2, 15, 0, 2 * Math.PI);
            ctx.fill();
            ctx.fillStyle = 'white';
            ctx.font = '14px Arial';
            ctx.fillText(player.name, canvas.width / 2 - 30, canvas.height / 2 - 30);
            
            // Подсказка какой блок выбран
            ctx.fillStyle = 'white';
            ctx.font = '12px Arial';
            ctx.fillText(`Выбран: ${BLOCKS.find(b => b.id === selectedBlock)?.name}`, 10, 20);
        }
        
        // ==================== ДВИЖЕНИЕ ====================
        function move(dx, dy) {
            player.x += dx;
            player.y += dy;
            
            if (gameMode === 'multi' && socket && socket.connected) {
                socket.emit('move', player);
            }
            
            draw();
        }
        
        // Кнопки движения
        document.getElementById('moveUp').addEventListener('click', () => move(0, -40));
        document.getElementById('moveDown').addEventListener('click', () => move(0, 40));
        document.getElementById('moveLeft').addEventListener('click', () => move(-40, 0));
        document.getElementById('moveRight').addEventListener('click', () => move(40, 0));
        
        // Клавиатура
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            
            switch(e.key) {
                case 'ArrowUp': case 'w': case 'W':
                    move(0, -40);
                    e.preventDefault();
                    break;
                case 'ArrowDown': case 's': case 'S':
                    move(0, 40);
                    e.preventDefault();
                    break;
                case 'ArrowLeft': case 'a': case 'A':
                    move(-40, 0);
                    e.preventDefault();
                    break;
                case 'ArrowRight': case 'd': case 'D':
                    move(40, 0);
                    e.preventDefault();
                    break;
            }
        });
        
        // ==================== УСТАНОВКА БЛОКОВ ====================
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            let worldX = Math.floor((x + player.x - canvas.width / 2) / 40);
            let worldY = Math.floor((y + player.y - canvas.height / 2) / 40);
            
            if (worldX >= 0 && worldX < WORLD_SIZE && worldY >= 0 && worldY < WORLD_SIZE) {
                // Ставим выбранный блок
                world[worldX][worldY] = selectedBlock;
                
                if (gameMode === 'multi' && socket && socket.connected) {
                    socket.emit('setBlock', { x: worldX, y: worldY, blockType: selectedBlock });
                }
                
                draw();
            }
        });
        
        // ==================== ЧАТ ====================
        document.getElementById('sendBtn').addEventListener('click', () => {
            const input = document.getElementById('chatInput');
            const msg = input.value.trim();
            
            if (!msg) return;
            
            if (gameMode === 'multi' && socket && socket.connected) {
                socket.emit('chat', msg);
            }
            
            addChatMessage(`👤 ${player.name}: ${msg}`);
            input.value = '';
        });
        
        document.getElementById('chatInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('sendBtn').click();
            }
        });
        
        function addChatMessage(text) {
            const chatDiv = document.getElementById('chatMessages');
            chatDiv.innerHTML += `<div>${text}</div>`;
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }
        
        // ==================== ПЕРЕКЛЮЧЕНИЕ РЕЖИМОВ ====================
        document.getElementById('modeSingle').addEventListener('click', () => {
            gameMode = 'single';
            document.getElementById('modeSingle').classList.add('active');
            document.getElementById('modeMulti').classList.remove('active');
            document.getElementById('serverRow').style.display = 'none';
            document.getElementById('status').innerHTML = '🟢 Одиночный режим';
            
            if (socket) {
                socket.disconnect();
                socket = null;
            }
            
            players = {};
            draw();
        });
        
        document.getElementById('modeMulti').addEventListener('click', () => {
            gameMode = 'multi';
            document.getElementById('modeMulti').classList.add('active');
            document.getElementById('modeSingle').classList.remove('active');
            document.getElementById('serverRow').style.display = 'flex';
            document.getElementById('status').innerHTML = '🟡 Введите URL сервера';
        });
        
        // Подключение к серверу
        document.getElementById('connectBtn').addEventListener('click', () => {
            let serverUrl = document.getElementById('serverUrl').value.trim();
            
            if (!serverUrl) {
                serverUrl = 'https://mygame.onrender.com';
            }
            
            document.getElementById('status').innerHTML = '🔵 Подключение...';
            
            if (socket) {
                socket.disconnect();
            }
            
            socket = io(serverUrl);
            
            socket.on('connect', () => {
                document.getElementById('status').innerHTML = '🟢 В мультиплеере';
                socket.emit('move', player);
            });
            
            socket.on('init', (data) => {
                world = data.world || world;
                players = data.players || {};
                draw();
            });
            
            socket.on('playerMoved', (data) => {
                players[data.id] = { x: data.x, y: data.y, name: data.name };
                draw();
            });
            
            socket.on('playerLeft', (id) => {
                delete players[id];
                draw();
            });
            
            socket.on('blockUpdated', (data) => {
                if (!world[data.x]) world[data.x] = [];
                world[data.x][data.y] = data.blockType;
                draw();
            });
            
            socket.on('chat', (msg) => {
                addChatMessage(msg);
            });
            
            socket.on('disconnect', () => {
                document.getElementById('status').innerHTML = '🔴 Отключён';
            });
        });
        
        // ==================== СТАРТ ====================
        draw();
    </script>
</body>
  </html>
